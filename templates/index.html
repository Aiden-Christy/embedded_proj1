<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TANGO // CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/nipplejs"></script>
<style>
  :root {
    --bg: #0a0c0f;
    --panel: #111418;
    --border: #1e2530;
    --accent: #00e5ff;
    --accent2: #ff3d00;
    --text: #c8d6e5;
    --dim: #4a5568;
    --mono: 'Share Tech Mono', monospace;
    --head: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, #ffffff04 39px, #ffffff04 40px);
  }

  header {
    width: 100%;
    max-width: 480px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 24px;
  }

  header h1 {
    font-family: var(--head);
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: 0.15em;
    color: #fff;
    text-transform: uppercase;
  }

  header h1 span { color: var(--accent); }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
    display: inline-block;
    margin-right: 8px;
  }

  #status-label {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    margin-bottom: 16px;
    position: relative;
  }

  .card-label {
    font-family: var(--head);
    font-weight: 600;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .card-label::before {
    content: '// ';
    color: var(--accent);
  }

  /* Joystick — wrapper gives breathing room above the circle so
     the top half is fully reachable on touch screens              */
  #zone-wrapper {
    padding: 24px 0 12px;
  }

  #zone {
    width: 220px;
    height: 220px;
    margin: 0 auto;
    background: radial-gradient(circle at center, #151b23 0%, #0d1117 100%);
    border: 1px solid var(--border);
    border-radius: 50%;
    position: relative;
    touch-action: none;   /* stops browser scroll stealing the drag */
  }

  /* crosshair lines */
  #zone::before, #zone::after {
    content: '';
    position: absolute;
    background: var(--border);
  }
  #zone::before { width: 1px; height: 100%; left: 50%; top: 0; }
  #zone::after  { width: 100%; height: 1px; top: 50%; left: 0; }

  /* Sliders */
  .slider-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .slider-row:last-child { margin-bottom: 0; }

  .slider-name {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    width: 52px;
    flex-shrink: 0;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]:active::-webkit-slider-thumb {
    transform: scale(1.4);
  }

  .slider-val {
    font-size: 0.7rem;
    color: var(--accent);
    width: 40px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Stop button */
  #stop-btn {
    display: block;
    width: 100%;
    max-width: 480px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--accent2);
    color: var(--accent2);
    font-family: var(--head);
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s, box-shadow 0.15s;
    margin-bottom: 16px;
  }

  #stop-btn:active {
    background: var(--accent2);
    color: #fff;
    box-shadow: 0 0 20px var(--accent2);
  }

  /* Telemetry bar */
  #telem {
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.8;
    margin-bottom: 16px;
  }

  #telem span { color: var(--text); }

  /* Chat */
  #chat-log {
    height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 14px;
    padding-right: 4px;
  }

  #chat-log::-webkit-scrollbar { width: 4px; }
  #chat-log::-webkit-scrollbar-track { background: transparent; }
  #chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 3px;
    font-size: 0.75rem;
    line-height: 1.5;
    letter-spacing: 0.03em;
  }

  .msg.user {
    align-self: flex-end;
    background: #0d2233;
    border: 1px solid #1a3a52;
    color: var(--accent);
  }

  .msg.robot {
    align-self: flex-start;
    background: #131a14;
    border: 1px solid #1e3020;
    color: #7dff8a;
  }

  .msg.robot .actions {
    margin-top: 6px;
    font-size: 0.65rem;
    color: var(--dim);
    letter-spacing: 0.08em;
  }

  .msg.robot .actions span {
    background: #1e2530;
    border: 1px solid var(--border);
    padding: 1px 6px;
    border-radius: 2px;
    margin-right: 4px;
    display: inline-block;
    margin-top: 2px;
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
  }

  #chat-input {
    flex: 1;
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--dim); }

  #chat-send {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--head);
    font-weight: 600;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 9px 16px;
    border-radius: 3px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s;
  }

  #chat-send:hover { background: #001a22; }
  #chat-send:active { background: var(--accent); color: #000; }
  #chat-send:disabled { opacity: 0.4; cursor: not-allowed; }

  .typing {
    align-self: flex-start;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }
</style>
</head>
<body>

<header>
  <h1>TAN<span>GO</span></h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-label">ONLINE</span>
  </div>
</header>

<div class="card">
  <div class="card-label">Drive</div>
  <!-- wrapper adds space above so the joystick top half is reachable -->
  <div id="zone-wrapper">
    <div id="zone"></div>
  </div>
</div>

<div class="card">
  <div class="card-label">Servos</div>

  <div class="slider-row">
    <span class="slider-name">HEAD H</span>
    <input type="range" min="-1" max="1" step="0.01" value="0" id="headH">
    <span class="slider-val" id="headH-val">0.00</span>
  </div>

  <div class="slider-row">
    <span class="slider-name">HEAD V</span>
    <input type="range" min="-1" max="1" step="0.01" value="0" id="headV">
    <span class="slider-val" id="headV-val">0.00</span>
  </div>

  <div class="slider-row">
    <span class="slider-name">WAIST</span>
    <input type="range" min="-1" max="1" step="0.01" value="0" id="waist">
    <span class="slider-val" id="waist-val">0.00</span>
  </div>
</div>

<button id="stop-btn">⬛ EMERGENCY STOP</button>

<div id="telem">
  THROTTLE <span id="t-throttle">0.00</span> &nbsp;|&nbsp;
  TURN <span id="t-turn">0.00</span> &nbsp;|&nbsp;
  TX <span id="t-count">0</span>
</div>

<div class="card">
  <div class="card-label">Talk to Tango</div>
  <div id="chat-log"></div>
  <div class="chat-input-row">
    <input type="text" id="chat-input" placeholder="Say something to Tango..." autocomplete="off">
    <button id="chat-send">Send</button>
  </div>
</div>

<script>
const BASE = window.location.origin;
let txCount = 0;

function post(path, data) {
  fetch(BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  }).catch(() => {
    document.getElementById('status-dot').style.background = '#ff3d00';
    document.getElementById('status-dot').style.boxShadow = '0 0 8px #ff3d00';
    document.getElementById('status-label').textContent = 'ERROR';
    document.getElementById('status-label').style.color = '#ff3d00';
  });
  document.getElementById('t-count').textContent = ++txCount;
}

// ── Joystick ──────────────────────────────────────────────────────────────────
var manager = nipplejs.create({
  zone: document.getElementById('zone'),
  mode: 'static',
  position: { left: '50%', top: '50%' },
  color: '#00e5ff',
  size: 80
});

let lastSend = 0;

manager.on('move', (evt, data) => {
  let now = Date.now();
  if (now - lastSend < 80) return;
  lastSend = now;
  const throttle = -data.vector.y;  // negate — up on stick = forward
  const turn = data.vector.x;
  document.getElementById('t-throttle').textContent = throttle.toFixed(2);
  document.getElementById('t-turn').textContent = turn.toFixed(2);
  post("/drive", { throttle, turn });
});

manager.on('end', () => {
  document.getElementById('t-throttle').textContent = '0.00';
  document.getElementById('t-turn').textContent = '0.00';
  post("/stop", {});
});

// ── Sliders ───────────────────────────────────────────────────────────────────
["headH", "headV", "waist"].forEach(id => {
  const el = document.getElementById(id);
  const valEl = document.getElementById(id + '-val');
  el.oninput = e => {
    const val = parseFloat(e.target.value);
    valEl.textContent = val.toFixed(2);
    if (id === "waist")
      post("/waist", { waist: val });
    else
      post("/head", { [id]: val });
  };
});

// ── Stop button ───────────────────────────────────────────────────────────────
document.getElementById('stop-btn').onclick = () => post("/stop", {});

// ── Chat ──────────────────────────────────────────────────────────────────────
const chatLog   = document.getElementById('chat-log');
const chatInput = document.getElementById('chat-input');
const chatSend  = document.getElementById('chat-send');

function appendMsg(text, who, actions) {
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  div.textContent = text;
  if (actions && actions.length) {
    const acts = document.createElement('div');
    acts.className = 'actions';
    actions.forEach(a => {
      const s = document.createElement('span');
      s.textContent = a;
      acts.appendChild(s);
    });
    div.appendChild(acts);
  }
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
}

async function sendChat() {
  const text = chatInput.value.trim();
  if (!text) return;

  appendMsg(text, 'user');
  chatInput.value = '';
  chatSend.disabled = true;

  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.textContent = 'TANGO IS THINKING...';
  chatLog.appendChild(typing);
  chatLog.scrollTop = chatLog.scrollHeight;

  try {
    const res = await fetch(BASE + '/dialog', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    chatLog.removeChild(typing);
    if (data.speak) {
      appendMsg(data.speak, 'robot', data.actions || []);
    } else if (data.error) {
      appendMsg('ERROR: ' + data.error, 'robot');
    }
  } catch (e) {
    chatLog.removeChild(typing);
    appendMsg('Could not reach Tango.', 'robot');
  }

  chatSend.disabled = false;
  chatInput.focus();
}

chatSend.onclick = sendChat;
chatInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendChat();
});
</script>
</body>
</html>
